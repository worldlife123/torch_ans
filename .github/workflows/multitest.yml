name: Multi Platform Test

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ci-tests-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  test-matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            python-version: 3.7
            torch: 1.10.1
          - os: ubuntu-24.04
            python-version: 3.9
            torch: 2.1.1
          - os: ubuntu-24.04-arm
            python-version: 3.9
            torch: 2.1.1
          - os: windows-latest
            python-version: 3.9
            torch: 2.1.1
          - os: macos-15-intel
            python-version: 3.9
            torch: 2.1.1
          - os: macos-15
            python-version: 3.9
            torch: 2.1.1
          - os: ubuntu-latest
            python-version: 3.11
            torch: 2.7.1
          - os: ubuntu-24.04-arm
            python-version: 3.11
            torch: 2.7.1
          - os: windows-latest
            python-version: 3.11
            torch: 2.7.1
          - os: macos-latest
            python-version: 3.11
            torch: 2.7.1
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml','**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install setuptools wheel pybind11 pytest


      - name: Install libomp on macOS
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install libomp

      - name: Install PyTorch
        run: |
          # Use the official PyTorch wheels index for compatibility across platforms
          pip install "torch==${{ matrix.torch }}" -f https://download.pytorch.org/whl/torch_stable.html

      - name: Install package
        run: |
          # Install package in non-isolated mode so compiled extension builds against the installed torch
          pip install --no-build-isolation .

      - name: Show versions
        run: |
          python -c "import sys, torch; print('Python', sys.version.split()[0], 'torch', torch.__version__)"

      - name: Run tests
        run: |
          pytest -q
