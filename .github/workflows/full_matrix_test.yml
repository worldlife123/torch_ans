name: Full Matrix Test

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ci-tests-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.fetch.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Fetch PyTorch versions
        id: fetch
        run: |
          python scripts/fetch_pytorch_versions.py > versions.json
          matrix=$(jq -c '.matrix' versions.json)
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

  test-matrix:
    needs: setup-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    env:
      FORCE_CUDA: ${{ matrix.cuda-version != 'cpu' && '1' || '0' }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pip
        run: python -m ensurepip --upgrade || true
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install PyTorch (official wheel)
        run: |
          if [ "${{ matrix.cuda-version }}" = "cpu" ]; then
            pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          else
            pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/${{ matrix.cuda-version }}
          fi
      - name: Install build dependencies
        run: pip install setuptools wheel pybind11 pytest
      - name: Build and install extension
        run: pip install --no-build-isolation .
      - name: Show versions
        run: python -c "import sys, torch; print('Python', sys.version.split()[0], 'torch', torch.__version__, 'CUDA:', torch.cuda.is_available())"
      - name: Run tests
        run: pytest -q tests
