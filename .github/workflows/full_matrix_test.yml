name: Full Matrix Test

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

concurrency:
  group: ci-fulltest-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.fetch.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Fetch PyTorch versions
        id: fetch
        run: |
          python scripts/fetch_pytorch_versions.py --cuda-versions cpu > versions.json
          matrix=$(jq -c '.matrix' versions.json)
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

  test-matrix:
    needs: setup-matrix
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    env:
      FORCE_CUDA: ${{ matrix.cuda-version != 'cpu' && '1' || '0' }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pip
        run: python -m ensurepip --upgrade || true
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install PyTorch (official wheel)
        shell: bash
        run: |
          if [ "${{ matrix.cuda-version }}" = "cpu" ]; then
            pip install torch --index-url https://download.pytorch.org/whl/cpu
          else
            pip install torch --index-url https://download.pytorch.org/whl/${{ matrix.cuda-version }}
          fi
      - name: Install build dependencies
        run: pip install setuptools wheel pybind11 pytest pytest-benchmark
      - name: Build and install extension
        run: pip install --no-build-isolation .
      - name: Show versions
        run: python -c "import sys, torch; print('Python', sys.version.split()[0], 'torch', torch.__version__, 'CUDA:', torch.cuda.is_available())"
      - name: Run tests
        run: pytest -q tests
      - name: Run benchmarks
        run: pytest --benchmark-only --benchmark-json=benchmark.json tests/test_benchmarks.py
      - name: Create result file
        shell: bash
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "PASS" > result.txt
          else
            echo "FAIL" > result.txt
          fi
      - name: Upload result
        uses: actions/upload-artifact@v7
        with:
          name: test-result-${{ matrix.os }}-${{ matrix.platform }}-${{ matrix.python-version }}-${{ matrix.cuda-version }}
          path: result.txt
      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-result-${{ matrix.os }}-${{ matrix.platform }}-${{ matrix.python-version }}-${{ matrix.cuda-version }}
          path: benchmark.json

  update-build-status:
    needs: test-matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download all results
        uses: actions/download-artifact@v7
        with:
          path: results/
      - name: Generate table
        shell: bash
        run: |
          echo "## Test Results" > table.md
          echo "" >> table.md
          echo "| OS | Platform | Python | CUDA | Status |" >> table.md
          echo "|----|----------|--------|------|--------|" >> table.md
          for dir in results/test-result-*; do
            if [ -d "$dir" ]; then
              result_file="$dir/result.txt"
              if [ -f "$result_file" ]; then
                # Parse dirname: test-result-os-platform-python-cuda
                dirname=$(basename "$dir")
                dirname=${dirname#test-result-}
                IFS='-' read -r os platform python cuda <<< "$dirname"
                status=$(cat "$result_file")
                if [ "$status" = "PASS" ]; then
                  status="✅"
                else
                  status="❌"
                fi
                echo "| $os | $platform | $python | $cuda | $status |" >> table.md
              fi
            fi
          done
          echo "" >> table.md
          echo "Last updated: $(date)" >> table.md
      - name: Generate benchmark table
        shell: bash
        run: python scripts/generate_benchmark_status.py results benchmark_status.md
      - name: Create build_status.md
        shell: bash
        run: mv table.md build_status.md
      - name: Commit changes
        uses: EndBug/add-and-commit@v10
        with:
          author_name: GitHub Actions
          author_email: actions@github.com
          message: 'Update build and benchmark status tables'
          add: 'build_status.md benchmark_status.md'
